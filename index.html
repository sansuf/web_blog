<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>博客系统</title>
</head>
<body>

<h1>我的博客</h1>

<h2>发布文章</h2>
<input id="title" placeholder="标题"><br><br>
<textarea id="content" placeholder="内容"></textarea><br><br>
<button onclick="addPost()">发布</button>

<h2>文章列表</h2>
<ul id="list"></ul>

<h2>登录</h2>
<input id="username" placeholder="用户名">
<input id="password" placeholder="密码">
<button onclick="login()">登录</button>

<script src="app.js"></script>

</body>
</html>
